name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Projekt entpacken
        run: unzip -o JoniRadioRecorder.zip -d .

      - name: JDK 17 einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK einrichten
        uses: android-actions/setup-android@v3

      - name: Gradle Wrapper erzeugen
        working-directory: JoniRadioRecorder
        run: gradle wrapper --gradle-version 8.4

      - name: Debug-APK bauen
        working-directory: JoniRadioRecorder
        run: ./gradlew assembleDebug --no-daemon

      - name: APK als Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: RadioRecorder-debug-apk
          path: JoniRadioRecorder/app/build/outputs/apk/debug/app-debug.apk
